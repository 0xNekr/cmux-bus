name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        shell: bash
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "Linux" ]; then
              sudo apt-get update
              sudo apt-get install -y jq
            elif [ "$RUNNER_OS" = "macOS" ]; then
              brew install jq
            else
              echo "Unsupported runner OS: $RUNNER_OS" >&2
              exit 1
            fi
          fi
          jq --version

      - name: Syntax check
        shell: bash
        run: bash -n bin/agent-* install.sh tests/run.sh

      - name: Run smoke tests
        shell: bash
        run: ./tests/run.sh
